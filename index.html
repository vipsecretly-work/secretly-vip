<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' https://ipapi.co; font-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'unsafe-inline'; base-uri 'self'; form-action 'self' mailto:; frame-ancestors 'none'; object-src 'none'; upgrade-insecure-requests" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>secretly.vip — coming soon</title>
  <!--
    Preload font files before any paint.
    crossorigin is required even for same-origin fonts because @font-face
    fetches use CORS mode — the preload must match or the browser downloads twice.
  -->
  <link rel="preload" href="fonts/cinzel-latin.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="fonts/outfit-latin.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23e52222'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='Georgia,serif' font-size='19' font-weight='700' fill='%23fff'%3ES%3C/text%3E%3C/svg%3E" />
  <style>
    /*
      font-display: block — text stays INVISIBLE while font downloads (up to ~3s).
      Combined with preload above, the font is ready in <200ms on most connections.
      No fallback font is ever shown, so no flash/swap at all.
    */
    @font-face {
      font-family: "Cinzel";
      src: url("fonts/cinzel-latin.woff2") format("woff2");
      font-weight: 400 600;
      font-style: normal;
      font-display: block;
    }
    @font-face {
      font-family: "Outfit";
      src: url("fonts/outfit-latin.woff2") format("woff2");
      font-weight: 300 500;
      font-style: normal;
      font-display: block;
    }

    :root {
      --bg: #f7f4f0;
      --ink: #100d0d;
      --dim: rgba(16, 13, 13, 0.45);
      --red: #e52222;
      --red-dim: rgba(229, 34, 34, 0.6);
      --red-light: #d96060;   /* light red for UI chrome */
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html { height: 100%; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: "Outfit", system-ui, -apple-system, sans-serif;
      font-weight: 400;
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding:
        calc(3.5rem + env(safe-area-inset-top, 0px))
        calc(1.5rem + env(safe-area-inset-right, 0px))
        calc(3.5rem + env(safe-area-inset-bottom, 0px))
        calc(1.5rem + env(safe-area-inset-left, 0px));
      -webkit-font-smoothing: antialiased;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 100;
      pointer-events: none;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='4' stitchTiles='stitch'/></filter><rect width='180' height='180' filter='url(%23n)'/></svg>");
    }

    .brand {
      position: fixed;
      top: calc(1.25rem + env(safe-area-inset-top, 0px));
      left: calc(1.25rem + env(safe-area-inset-left, 0px));
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--red-light);
      z-index: 10;
      line-height: 1;
    }

    .clock {
      position: fixed;
      bottom: calc(1.25rem + env(safe-area-inset-bottom, 0px));
      top: auto;
      left: calc(1.25rem + env(safe-area-inset-left, 0px));
      right: auto;
      display: flex;
      align-items: center;
      gap: 0.4em;
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--red-light);
      z-index: 12;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      line-height: 1;
      transition: opacity 0.25s ease;
    }
    .globe-icon {
      width: 0.92rem;
      height: 0.92rem;
      flex-shrink: 0;
      overflow: visible;
    }
    .user-region {
      color: var(--red-light);
      opacity: 0.85;
    }
    /* When music bar is up: moves to top-right */
    .clock.at-top {
      bottom: auto;
      top: calc(1.25rem + env(safe-area-inset-top, 0px));
      left: auto;
      right: calc(1.25rem + env(safe-area-inset-right, 0px));
      flex-direction: row-reverse;
    }

    /* ── Autoplay hint (mobile) ── */
    .intro-hint {
      position: fixed;
      bottom: calc(3.5rem + env(safe-area-inset-bottom, 0px));
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--red-light);
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s ease;
      z-index: 10;
    }
    .intro-hint.shown { opacity: 1; }

    /* ── Music bar (appears after intro ends) ── */
    .music-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding:
        0.55rem
        calc(1.25rem + env(safe-area-inset-right, 0px))
        calc(0.55rem + env(safe-area-inset-bottom, 0px))
        calc(1.25rem + env(safe-area-inset-left, 0px));
      background: var(--bg);
      border-top: 1px solid rgba(16, 13, 13, 0.07);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      z-index: 11;
      transform: translateY(100%);
      transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .music-bar.shown { transform: translateY(0); }

    .mb-label {
      font-size: 0.72rem;
      letter-spacing: 0.11em;
      text-transform: uppercase;
      color: var(--red-light);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }

    .mb-controls {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    .mb-btn {
      background: none;
      border: none;
      padding: 0.35rem;
      cursor: pointer;
      color: var(--red-light);
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 2rem;
      min-height: 2rem;
      border-radius: 4px;
      transition: color 0.15s ease;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .mb-btn:hover { color: var(--ink); }
    .mb-btn:focus-visible { outline: 1px solid var(--red); outline-offset: 2px; }
    .mb-btn.on  { color: var(--red); }
    .mb-btn svg {
      width: 1rem;
      height: 1rem;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
    }

    main {
      width: 100%;
      max-width: 32rem;
    }

    h1 {
      font-family: "Cinzel", "Times New Roman", Times, serif;
      font-weight: 600;
      font-size: clamp(1.35rem, 5vw, 1.65rem);
      line-height: 1.3;
      letter-spacing: 0em;
      color: var(--ink);
      opacity: 0;
      /* Height is locked dynamically by JS before each decode to prevent layout shake */
      word-break: break-word;
    }

    h1 {
      transition: opacity 0.55s ease, filter 0.55s ease;
    }

    .slash {
      display: block;
      width: 100%;
      height: 1px;
      background: var(--red);
      margin: 1.25rem 0 1.5rem;
    }

    .contact {
      display: flex;
      align-items: flex-start;
      gap: 0.55rem;
      color: var(--red-light);
      font-size: clamp(0.88rem, 3.4vw, 1rem);
      font-weight: 400;
      letter-spacing: 0.04em;
      flex-wrap: wrap;
    }

    .contact svg {
      width: 1rem;
      height: 1rem;
      stroke: var(--red-light);
      fill: none;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
      margin-top: 0.15em;
    }

    .contact-text {
      flex: 1;
      min-width: 0;
      word-break: break-word;
    }

    .contact a {
      font-family: "Cinzel", "Times New Roman", Times, serif;
      font-size: clamp(0.88rem, 3.2vw, 1rem);
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--red-light);
      text-decoration: none;
      border-bottom: 1px solid rgba(217, 96, 96, 0.3);
      padding-bottom: 1px;
      transition: color 0.18s ease, border-color 0.18s ease;
      word-break: break-all;
    }

    .contact a:hover  { color: var(--red); border-color: var(--red); }
    .contact a:focus-visible { outline: 1px solid var(--red); outline-offset: 3px; }

    @media (max-width: 360px) {
      h1 { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
  <span class="brand">secretly.vip</span>
  <div class="clock" id="clockWrap" aria-live="polite" aria-label="Your local time and location">
    <svg class="globe-icon" aria-hidden="true" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <!-- Sphere outline -->
      <circle cx="12" cy="12" r="9.5" stroke-width="1.15"/>
      <!-- Latitude rings -->
      <ellipse cx="12" cy="8.5"  rx="9" ry="2.6" stroke-width="0.7" opacity="0.5"/>
      <line x1="2.5" y1="12" x2="21.5" y2="12"   stroke-width="0.7" opacity="0.5"/>
      <ellipse cx="12" cy="15.5" rx="9" ry="2.6" stroke-width="0.7" opacity="0.5"/>
      <!-- Longitude meridians — rx animates to simulate Y-axis rotation -->
      <ellipse cx="12" cy="12" ry="9.5" stroke-width="0.9">
        <animate attributeName="rx" values="9.5;0;9.5;0;9.5"
                 dur="6s" repeatCount="indefinite" calcMode="linear"/>
      </ellipse>
      <ellipse cx="12" cy="12" ry="9.5" stroke-width="0.7" opacity="0.38">
        <animate attributeName="rx" values="0;9.5;0;9.5;0"
                 dur="6s" repeatCount="indefinite" calcMode="linear"/>
      </ellipse>
    </svg>
    <span id="clock"></span>
    <span class="user-region" id="userRegion"></span>
  </div>

  <audio id="introAudio" src="music/opening.mp3"          preload="auto"></audio>
  <audio id="bgmAudio"   src="music/background_music.mp3" preload="auto" loop></audio>

  <!-- Shows only on mobile/browsers that block autoplay -->
  <div class="intro-hint" id="introHint" aria-hidden="true">tap anywhere · sound incoming</div>

  <!-- Slides up after intro finishes -->
  <div class="music-bar" id="musicBar" aria-hidden="true">
    <span class="mb-label">♪ background music</span>
    <div class="mb-controls">
      <button class="mb-btn" id="mcPause" aria-label="Pause music"></button>
      <button class="mb-btn" id="mcVol"   aria-label="Low volume"></button>
      <button class="mb-btn" id="mcMute"  aria-label="Mute music"></button>
    </div>
  </div>

  <main>
    <h1 id="headline" aria-live="polite"></h1>
    <div class="slash" aria-hidden="true"></div>
    <p class="contact">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
        <path d="m22 6-10 7L2 6"/>
      </svg>
      <span class="contact-text">Reach out — <a href="mailto:support@secretly.vip">support@secretly.vip</a></span>
    </p>
  </main>

  <script>
  (function () {
    /* ── Decode characters — letters + digits only, no HTML-breaking symbols ── */
    var QUOTES = [
      'Establishing secure connection.',
      'Decrypting the launch sequence.',
      'Systems are being compiled.',
      'Signal acquired. Stand by.',
      'The protocol is being finalized.',
      'Loading classified content.',
      'Patience is a root privilege.',
      'Initializing final sequence.',
      'Something worth the wait.',
      'Almost there. Keep watching.',
      'Quietly coming together.',
      'The signal is almost clear.',
    ];

    var h1     = document.getElementById('headline');
    var qIndex = Math.floor(Math.random() * QUOTES.length);
    var busy   = false;

    /* Measure exact height a text string needs while element is invisible */
    function measureHeight(text) {
      h1.textContent = text;
      var h = h1.offsetHeight;
      h1.textContent = '';
      return h;
    }

    function showQuote(text, onDone) {
      var targetH = measureHeight(text);
      h1.style.height = targetH + 'px';
      h1.textContent  = text;

      /* Start from blurred-out, then animate in */
      h1.style.transition = 'none';
      h1.style.opacity    = '0';
      h1.style.filter     = 'blur(10px)';

      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          h1.style.transition = 'opacity 0.65s ease, filter 0.65s ease';
          h1.style.opacity    = '1';
          h1.style.filter     = 'blur(0px)';
        });
      });

      setTimeout(function () {
        h1.style.height = '';
        if (onDone) onDone();
      }, 700);
    }

    function nextQuote() {
      if (busy) return;
      busy = true;

      h1.style.transition = 'opacity 0.45s ease, filter 0.45s ease';
      h1.style.opacity    = '0';
      h1.style.filter     = 'blur(10px)';

      setTimeout(function () {
        qIndex = (qIndex + 1) % QUOTES.length;
        showQuote(QUOTES[qIndex], function () { busy = false; });
      }, 500);
    }

    function start() {
      showQuote(QUOTES[qIndex], function () {
        busy = false;
        setInterval(nextQuote, 5000);
      });
    }

    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(start);
    } else {
      setTimeout(start, 200);
    }

    /* ── Local clock ── */
    var clockEl  = document.getElementById('clock');
    var regionEl = document.getElementById('userRegion');
    var DAYS_S   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    var DAYS_L   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    var MONTHS   = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    function pad(n) { return String(n).padStart(2, '0'); }

    function tick() {
      var now    = new Date();
      var narrow = window.innerWidth < 480;
      var day    = narrow ? DAYS_S[now.getDay()] : DAYS_L[now.getDay()];
      clockEl.textContent =
        day + ' · ' +
        pad(now.getDate()) + ' ' + MONTHS[now.getMonth()] + ' ' + now.getFullYear() +
        ' · ' + pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
    }

    tick();
    setInterval(tick, 1000);

    /* ── IP geolocation (no permission needed) ── */
    var CONTINENTS = {
      AF: 'Africa', AN: 'Antarctica', AS: 'Asia',
      EU: 'Europe', NA: 'North America', OC: 'Oceania', SA: 'South America'
    };
    fetch('https://ipapi.co/json/')
      .then(function (r) { return r.json(); })
      .then(function (d) {
        var region = CONTINENTS[d.continent_code] || d.country_name || '';
        var city   = d.city || d.region || '';
        var label  = region && city ? region + ' / ' + city : region || city;
        if (label) regionEl.textContent = '· ' + label;
      })
      .catch(function () {});

    /* ── Audio ──
       Phase 1 — opening.mp3: plays once, no controls, untouchable.
       Phase 2 — background_music.mp3: loops, music bar slides up with
                 pause / volume-low / mute controls.
    ── */
    var introEl  = document.getElementById('introAudio');
    var bgmEl    = document.getElementById('bgmAudio');
    var hint     = document.getElementById('introHint');
    var musicBar = document.getElementById('musicBar');
    var mcPause  = document.getElementById('mcPause');
    var mcVol    = document.getElementById('mcVol');
    var mcMute   = document.getElementById('mcMute');

    var ICO_PAUSE = '<svg viewBox="0 0 24 24"><line x1="6" y1="4" x2="6" y2="20"/><line x1="18" y1="4" x2="18" y2="20"/></svg>';
    var ICO_PLAY  = '<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
    var ICO_VOLLO = '<svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>';
    var ICO_VOLHI = '<svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>';
    var ICO_MUTE  = '<svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>';

    var volLow = false;
    var muted  = false;
    var phase  = 'idle';

    function bgmVol() { return muted ? 0 : (volLow ? 0.25 : 0.75); }

    function refreshButtons() {
      mcPause.innerHTML = bgmEl.paused ? ICO_PLAY  : ICO_PAUSE;
      mcPause.setAttribute('aria-label', bgmEl.paused ? 'Play music' : 'Pause music');
      mcPause.classList.toggle('on', bgmEl.paused);
      mcVol.innerHTML = volLow ? ICO_VOLLO : ICO_VOLHI;
      mcVol.setAttribute('aria-label', volLow ? 'Raise volume' : 'Lower volume');
      mcVol.classList.toggle('on', volLow);
      mcMute.innerHTML = ICO_MUTE;
      mcMute.setAttribute('aria-label', muted ? 'Unmute' : 'Mute');
      mcMute.classList.toggle('on', muted);
    }

    function showMusicBar() {
      musicBar.removeAttribute('aria-hidden');
      musicBar.classList.add('shown');
      document.body.classList.add('bar-up');
      refreshButtons();
      /* Fade clock out → reposition to top-right → fade back in */
      var cl = document.getElementById('clockWrap');
      cl.style.opacity = '0';
      setTimeout(function () {
        cl.classList.add('at-top');
        cl.style.opacity = '';
      }, 260);
    }

    function startBgm() {
      phase = 'bgm';
      bgmEl.volume = bgmVol();
      bgmEl.muted  = muted;
      bgmEl.play().catch(function () {});
      showMusicBar();
    }

    introEl.addEventListener('ended', startBgm);

    mcPause.addEventListener('click', function () {
      if (bgmEl.paused) { bgmEl.play().catch(function () {}); }
      else              { bgmEl.pause(); }
      setTimeout(refreshButtons, 30);
    });

    mcVol.addEventListener('click', function () {
      volLow = !volLow;
      if (!muted) bgmEl.volume = bgmVol();
      refreshButtons();
    });

    mcMute.addEventListener('click', function () {
      muted = !muted;
      bgmEl.muted  = muted;
      bgmEl.volume = bgmVol();
      refreshButtons();
    });

    function startIntro() {
      if (phase !== 'idle') return;
      phase = 'intro';
      hint.classList.remove('shown');
      introEl.volume = 0.75;
      introEl.play().catch(function () { phase = 'idle'; });
    }

    /* Autoplay attempt — succeeds on desktop, silently fails on mobile */
    introEl.play().then(function () {
      phase = 'intro';
    }).catch(function () {
      hint.classList.add('shown');
      hint.removeAttribute('aria-hidden');
      var unlock = function () {
        document.removeEventListener('click',      unlock);
        document.removeEventListener('touchstart', unlock);
        startIntro();
      };
      document.addEventListener('click',      unlock, { once: true });
      document.addEventListener('touchstart', unlock, { once: true });
    });
  })();
  </script>
</body>
</html>
