<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; font-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'unsafe-inline'; base-uri 'self'; form-action 'self' mailto:; frame-ancestors 'none'; object-src 'none'; upgrade-insecure-requests" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>secretly.vip — coming soon</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23e52222'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='Georgia,serif' font-size='19' font-weight='700' fill='%23fff'%3ES%3C/text%3E%3C/svg%3E" />
  <style>
    @font-face {
      font-family: "Cinzel";
      src: url("fonts/cinzel-latin.woff2") format("woff2");
      font-weight: 400 600;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: "Outfit";
      src: url("fonts/outfit-latin.woff2") format("woff2");
      font-weight: 300 500;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #f7f4f0;
      --ink: #100d0d;
      --dim: rgba(16, 13, 13, 0.45);
      --red: #e52222;
      --red-dim: rgba(229, 34, 34, 0.6);
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html { height: 100%; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: "Outfit", system-ui, -apple-system, sans-serif;
      font-weight: 400;
      min-height: 100vh;
      min-height: 100dvh; /* dynamic viewport height — avoids iOS browser-chrome issues */
      display: grid;
      place-items: center;
      /* Reserve space for fixed brand (top) and clock (bottom), plus safe areas */
      padding:
        calc(3.5rem + env(safe-area-inset-top, 0px))
        calc(1.5rem + env(safe-area-inset-right, 0px))
        calc(3.5rem + env(safe-area-inset-bottom, 0px))
        calc(1.5rem + env(safe-area-inset-left, 0px));
      -webkit-font-smoothing: antialiased;
    }

    /* Film grain — keeps it from feeling sterile */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 100;
      pointer-events: none;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='4' stitchTiles='stitch'/></filter><rect width='180' height='180' filter='url(%23n)'/></svg>");
    }

    /* Brand mark — respects notch / status bar */
    .brand {
      position: fixed;
      top: calc(1.25rem + env(safe-area-inset-top, 0px));
      left: calc(1.25rem + env(safe-area-inset-left, 0px));
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--red);
      z-index: 10;
      line-height: 1;
    }

    /* Local clock — respects home bar on iOS */
    .clock {
      position: fixed;
      bottom: calc(1.25rem + env(safe-area-inset-bottom, 0px));
      left: calc(1.25rem + env(safe-area-inset-left, 0px));
      right: calc(1.25rem + env(safe-area-inset-right, 0px));
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--dim);
      z-index: 10;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1;
    }

    main {
      width: 100%;
      max-width: 32rem;
    }

    h1 {
      font-family: "Cinzel", "Times New Roman", Times, serif;
      font-weight: 600;
      /* Tighter minimum so it never overflows on small phones */
      font-size: clamp(1.75rem, 7vw, 3.25rem);
      line-height: 1.22;
      letter-spacing: 0.01em;
      color: var(--ink);
    }

    .line {
      display: block;
    }

    /* The red slash — one deliberate accent, nothing more */
    .slash {
      display: block;
      width: 100%;
      height: 1px;
      background: var(--red);
      margin: 2rem 0 1.75rem;
    }

    /* Contact row — wraps gracefully on narrow screens */
    .contact {
      display: flex;
      align-items: flex-start;
      gap: 0.55rem;
      color: var(--dim);
      font-size: clamp(0.8rem, 3.2vw, 0.9rem);
      font-weight: 400;
      letter-spacing: 0.04em;
      flex-wrap: wrap;
    }

    .contact svg {
      width: 0.9rem;
      height: 0.9rem;
      stroke: var(--red-dim);
      fill: none;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
      margin-top: 0.15em; /* optical alignment when text wraps */
    }

    .contact-text {
      flex: 1;
      min-width: 0;
      word-break: break-word;
    }

    .contact a {
      font-family: "Cinzel", "Times New Roman", Times, serif;
      font-size: clamp(0.82rem, 3vw, 0.92rem);
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px solid rgba(16, 13, 13, 0.15);
      padding-bottom: 1px;
      transition: color 0.18s ease, border-color 0.18s ease;
      /* Allow email to break at the @ or dot if needed */
      word-break: break-all;
    }

    .contact a:hover {
      color: var(--red);
      border-color: var(--red);
    }

    .contact a:focus-visible {
      outline: 1px solid var(--red);
      outline-offset: 3px;
    }

    /* On very small screens, simplify the clock to just time + date */
    @media (max-width: 360px) {
      h1 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>
  <span class="brand">secretly.vip</span>
  <span class="clock" id="clock" aria-live="polite" aria-label="Your local time"></span>

  <main>
    <h1>
      <span class="line">This site's</span>
      <span class="line">gonna go live soon.</span>
    </h1>

    <div class="slash" aria-hidden="true"></div>

    <p class="contact">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
        <path d="m22 6-10 7L2 6"/>
      </svg>
      <span class="contact-text">Reach out — <a href="mailto:support@secretly.vip">support@secretly.vip</a></span>
    </p>
  </main>
  <script>
    (function () {
      var el = document.getElementById('clock');
      var DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      var DAYS_L = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      var MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

      function pad(n) { return String(n).padStart(2, '0'); }

      function tick() {
        var now   = new Date();
        var narrow = window.innerWidth < 480;
        var day   = narrow ? DAYS[now.getDay()] : DAYS_L[now.getDay()];
        var date  = pad(now.getDate());
        var month = MONTHS[now.getMonth()];
        var year  = now.getFullYear();
        var h     = pad(now.getHours());
        var m     = pad(now.getMinutes());
        var s     = pad(now.getSeconds());
        el.textContent = day + ' · ' + date + ' ' + month + ' ' + year + ' · ' + h + ':' + m + ':' + s;
      }

      tick();
      setInterval(tick, 1000);
    })();
  </script>
</body>
</html>
