<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; font-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'unsafe-inline'; base-uri 'self'; form-action 'self' mailto:; frame-ancestors 'none'; object-src 'none'; upgrade-insecure-requests" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>secretly.vip — coming soon</title>
  <!--
    Preload font files before any paint.
    crossorigin is required even for same-origin fonts because @font-face
    fetches use CORS mode — the preload must match or the browser downloads twice.
  -->
  <link rel="preload" href="fonts/cinzel-latin.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="fonts/outfit-latin.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23e52222'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='Georgia,serif' font-size='19' font-weight='700' fill='%23fff'%3ES%3C/text%3E%3C/svg%3E" />
  <style>
    /*
      font-display: block — text stays INVISIBLE while font downloads (up to ~3s).
      Combined with preload above, the font is ready in <200ms on most connections.
      No fallback font is ever shown, so no flash/swap at all.
    */
    @font-face {
      font-family: "Cinzel";
      src: url("fonts/cinzel-latin.woff2") format("woff2");
      font-weight: 400 600;
      font-style: normal;
      font-display: block;
    }
    @font-face {
      font-family: "Outfit";
      src: url("fonts/outfit-latin.woff2") format("woff2");
      font-weight: 300 500;
      font-style: normal;
      font-display: block;
    }

    :root {
      --bg: #f7f4f0;
      --ink: #100d0d;
      --dim: rgba(16, 13, 13, 0.45);
      --red: #e52222;
      --red-dim: rgba(229, 34, 34, 0.6);
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html { height: 100%; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: "Outfit", system-ui, -apple-system, sans-serif;
      font-weight: 400;
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding:
        calc(3.5rem + env(safe-area-inset-top, 0px))
        calc(1.5rem + env(safe-area-inset-right, 0px))
        calc(3.5rem + env(safe-area-inset-bottom, 0px))
        calc(1.5rem + env(safe-area-inset-left, 0px));
      -webkit-font-smoothing: antialiased;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 100;
      pointer-events: none;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='4' stitchTiles='stitch'/></filter><rect width='180' height='180' filter='url(%23n)'/></svg>");
    }

    .brand {
      position: fixed;
      top: calc(1.25rem + env(safe-area-inset-top, 0px));
      left: calc(1.25rem + env(safe-area-inset-left, 0px));
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--red);
      z-index: 10;
      line-height: 1;
    }

    .clock {
      position: fixed;
      bottom: calc(1.25rem + env(safe-area-inset-bottom, 0px));
      left: calc(1.25rem + env(safe-area-inset-left, 0px));
      /* Leave 2.75rem on the right for the sound button */
      right: calc(2.75rem + env(safe-area-inset-right, 0px));
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--dim);
      z-index: 10;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1;
    }

    /* ── Sound toggle ── */
    .sound-btn {
      position: fixed;
      bottom: calc(0.85rem + env(safe-area-inset-bottom, 0px));
      right: calc(1rem + env(safe-area-inset-right, 0px));
      z-index: 10;
      background: none;
      border: none;
      padding: 0.4rem;
      margin: 0;
      cursor: pointer;
      color: var(--dim);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      /* Generous touch target */
      min-width: 2.75rem;
      min-height: 2.75rem;
      justify-content: center;
      transition: color 0.2s ease, opacity 0.2s ease;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .sound-btn svg {
      width: 1.05rem;
      height: 1.05rem;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
      flex-shrink: 0;
    }

    /* Volume bars — 3 vertical bars like a signal indicator */
    .vol-bars {
      display: flex;
      align-items: flex-end;
      gap: 2.5px;
      height: 8px;
      pointer-events: none;
    }
    .vol-bars span {
      width: 3px;
      border-radius: 1.5px;
      background: currentColor;
      transition: opacity 0.25s ease, background 0.25s ease;
    }
    .vol-bars span:nth-child(1) { height: 3px; }
    .vol-bars span:nth-child(2) { height: 5.5px; }
    .vol-bars span:nth-child(3) { height: 8px; }

    /* Muted: all bars dimmed */
    .sound-btn.is-muted .vol-bars span { opacity: 0.18; }

    /* Low: only first bar lit */
    .sound-btn.vol-low .vol-bars span:nth-child(1) { opacity: 1; }
    .sound-btn.vol-low .vol-bars span:nth-child(2) { opacity: 0.18; }
    .sound-btn.vol-low .vol-bars span:nth-child(3) { opacity: 0.18; }

    /* High: all bars lit */
    .sound-btn.vol-high .vol-bars span { opacity: 1; }

    .sound-btn:hover { color: var(--ink); }
    .sound-btn:focus-visible { outline: 1px solid var(--red); outline-offset: 4px; border-radius: 4px; }

    /* Muted state */
    .sound-btn.is-muted { color: var(--red); opacity: 0.6; }

    /* Waiting for first interaction */
    .sound-btn.needs-tap {
      animation: soundPulse 2.2s ease-in-out infinite;
    }
    @keyframes soundPulse {
      0%, 100% { opacity: 0.45; }
      50%       { opacity: 0.95; }
    }

    /* ── Tooltip ── */
    .sound-tip {
      position: fixed;
      bottom: calc(4.6rem + env(safe-area-inset-bottom, 0px));
      right: calc(1rem + env(safe-area-inset-right, 0px));
      font-size: 0.6rem;
      font-weight: 400;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--dim);
      white-space: nowrap;
      z-index: 9;
      pointer-events: none;
      opacity: 0;
      transform: translateY(3px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .sound-tip.shown {
      opacity: 1;
      transform: translateY(0);
    }

    main {
      width: 100%;
      max-width: 32rem;
    }

    h1 {
      font-family: "Cinzel", "Times New Roman", Times, serif;
      font-weight: 600;
      font-size: clamp(1.35rem, 5vw, 1.65rem);
      line-height: 1.3;
      letter-spacing: 0em;
      color: var(--ink);
      opacity: 0;
      /* Height is locked dynamically by JS before each decode to prevent layout shake */
      word-break: break-word;
    }

    h1 {
      transition: opacity 0.55s ease, filter 0.55s ease;
    }

    .slash {
      display: block;
      width: 100%;
      height: 1px;
      background: var(--red);
      margin: 1.25rem 0 1.5rem;
    }

    .contact {
      display: flex;
      align-items: flex-start;
      gap: 0.55rem;
      color: var(--dim);
      font-size: clamp(0.8rem, 3.2vw, 0.9rem);
      font-weight: 400;
      letter-spacing: 0.04em;
      flex-wrap: wrap;
    }

    .contact svg {
      width: 0.9rem;
      height: 0.9rem;
      stroke: var(--red-dim);
      fill: none;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
      margin-top: 0.15em;
    }

    .contact-text {
      flex: 1;
      min-width: 0;
      word-break: break-word;
    }

    .contact a {
      font-family: "Cinzel", "Times New Roman", Times, serif;
      font-size: clamp(0.82rem, 3vw, 0.92rem);
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px solid rgba(16, 13, 13, 0.15);
      padding-bottom: 1px;
      transition: color 0.18s ease, border-color 0.18s ease;
      word-break: break-all;
    }

    .contact a:hover  { color: var(--red); border-color: var(--red); }
    .contact a:focus-visible { outline: 1px solid var(--red); outline-offset: 3px; }

    @media (max-width: 360px) {
      h1 { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
  <span class="brand">secretly.vip</span>
  <span class="clock" id="clock" aria-live="polite" aria-label="Your local time"></span>

  <!-- Music decoded via Web Audio API for truly gapless looping -->

  <div class="sound-tip" id="soundTip" aria-hidden="true">tap to listen</div>

  <button class="sound-btn needs-tap" id="soundBtn" aria-label="Music muted — tap to play">
    <svg id="soundIcon" viewBox="0 0 24 24" aria-hidden="true"></svg>
    <span class="vol-bars" aria-hidden="true">
      <span></span><span></span><span></span>
    </span>
  </button>

  <main>
    <h1 id="headline" aria-live="polite"></h1>
    <div class="slash" aria-hidden="true"></div>
    <p class="contact">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
        <path d="m22 6-10 7L2 6"/>
      </svg>
      <span class="contact-text">Reach out — <a href="mailto:support@secretly.vip">support@secretly.vip</a></span>
    </p>
  </main>

  <script>
  (function () {
    /* ── Decode characters — letters + digits only, no HTML-breaking symbols ── */
    var QUOTES = [
      'Establishing secure connection.',
      'Decrypting the launch sequence.',
      'Systems are being compiled.',
      'Signal acquired. Stand by.',
      'The protocol is being finalized.',
      'Loading classified content.',
      'Patience is a root privilege.',
      'Initializing final sequence.',
      'Something worth the wait.',
      'Almost there. Keep watching.',
      'Quietly coming together.',
      'The signal is almost clear.',
    ];

    var h1     = document.getElementById('headline');
    var qIndex = Math.floor(Math.random() * QUOTES.length);
    var busy   = false;

    /* Measure exact height a text string needs while element is invisible */
    function measureHeight(text) {
      h1.textContent = text;
      var h = h1.offsetHeight;
      h1.textContent = '';
      return h;
    }

    function showQuote(text, onDone) {
      var targetH = measureHeight(text);
      h1.style.height = targetH + 'px';
      h1.textContent  = text;

      /* Start from blurred-out, then animate in */
      h1.style.transition = 'none';
      h1.style.opacity    = '0';
      h1.style.filter     = 'blur(10px)';

      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          h1.style.transition = 'opacity 0.65s ease, filter 0.65s ease';
          h1.style.opacity    = '1';
          h1.style.filter     = 'blur(0px)';
        });
      });

      setTimeout(function () {
        h1.style.height = '';
        if (onDone) onDone();
      }, 700);
    }

    function nextQuote() {
      if (busy) return;
      busy = true;

      h1.style.transition = 'opacity 0.45s ease, filter 0.45s ease';
      h1.style.opacity    = '0';
      h1.style.filter     = 'blur(10px)';

      setTimeout(function () {
        qIndex = (qIndex + 1) % QUOTES.length;
        showQuote(QUOTES[qIndex], function () { busy = false; });
      }, 500);
    }

    function start() {
      showQuote(QUOTES[qIndex], function () {
        busy = false;
        setInterval(nextQuote, 5000);
      });
    }

    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(start);
    } else {
      setTimeout(start, 200);
    }

    /* ── Local clock ── */
    var clockEl = document.getElementById('clock');
    var DAYS_S  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    var DAYS_L  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    var MONTHS  = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    function pad(n) { return String(n).padStart(2, '0'); }

    function tick() {
      var now    = new Date();
      var narrow = window.innerWidth < 480;
      var day    = narrow ? DAYS_S[now.getDay()] : DAYS_L[now.getDay()];
      clockEl.textContent =
        day + ' · ' +
        pad(now.getDate()) + ' ' + MONTHS[now.getMonth()] + ' ' + now.getFullYear() +
        ' · ' + pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
    }

    tick();
    setInterval(tick, 1000);

    /* ── Audio: splash intro → gapless background loop ──
       1. splash_logo_audio.mp3 plays once on open (autoplay or first tap)
       2. When it ends, background_music.mp3 loops forever, zero gap
       Both go through a GainNode so the volume button always works.
    ── */
    var btn  = document.getElementById('soundBtn');
    var icon = document.getElementById('soundIcon');
    var tip  = document.getElementById('soundTip');
    var tipTimer, tipDismissTimer;

    function showTip() {
      clearTimeout(tipTimer);
      tipTimer = setTimeout(function () { tip.classList.add('shown'); }, 600);
    }
    function hideTip() {
      clearTimeout(tipTimer);
      clearTimeout(tipDismissTimer);
      tip.classList.remove('shown');
    }

    var STATES = [
      {
        gain: 0,    label: 'Music muted — tap to play',
        paths: '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>' +
               '<line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>'
      },
      {
        gain: 0.25, label: 'Low volume — tap to raise',
        paths: '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>' +
               '<path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>'
      },
      {
        gain: 0.75, label: 'High volume — tap to lower',
        paths: '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>' +
               '<path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>' +
               '<path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>'
      }
    ];

    var ACtx        = window.AudioContext || window.webkitAudioContext;
    var ctx         = null;
    var gainNode    = null;
    var introBuf    = null;   /* splash_logo_audio decoded buffer */
    var loopBuf     = null;   /* background_music decoded buffer  */
    var loopSrc     = null;
    var phase       = 'idle'; /* 'idle' | 'intro' | 'loop'        */
    var stateIdx    = 0;
    var pendingPlay = false;  /* user tapped before buffers loaded */

    function rampGain(val) {
      if (!gainNode) return;
      gainNode.gain.cancelScheduledValues(ctx.currentTime);
      gainNode.gain.linearRampToValueAtTime(val, ctx.currentTime + 0.4);
    }

    function applyState(idx) {
      var s = STATES[idx];
      icon.innerHTML = s.paths;
      btn.setAttribute('aria-label', s.label);
      btn.classList.toggle('is-muted', idx === 0);
      btn.classList.toggle('vol-low',  idx === 1);
      btn.classList.toggle('vol-high', idx === 2);
      rampGain(s.gain);
      stateIdx = idx;
    }

    function startLoop() {
      if (loopSrc) { try { loopSrc.stop(); } catch (e) {} loopSrc.disconnect(); }
      loopSrc = ctx.createBufferSource();
      loopSrc.buffer = loopBuf;
      loopSrc.loop   = true;          /* sample-perfect, zero gap */
      loopSrc.connect(gainNode);
      loopSrc.start(0);
      phase = 'loop';
      /* If user muted during intro, keep that; otherwise stay low */
      if (stateIdx === 0) applyState(1);
    }

    function startIntro() {
      if (phase !== 'idle') return;
      phase = 'intro';

      var src = ctx.createBufferSource();
      src.buffer = introBuf;
      src.loop   = false;
      src.connect(gainNode);

      src.onended = function () {
        /* Chain straight into the loop — wait for loopBuf if still loading */
        if (loopBuf) {
          startLoop();
        } else {
          var wait = setInterval(function () {
            if (loopBuf) { clearInterval(wait); startLoop(); }
          }, 80);
        }
      };

      src.start(0);
      hideTip();
      btn.classList.remove('needs-tap');
      applyState(1);  /* low volume for the whole session */
    }

    function tryStart() {
      /* Only proceed if context is running and intro buffer is ready */
      if (phase !== 'idle' || !introBuf || ctx.state !== 'running') return;
      startIntro();
    }

    function initCtx() {
      if (ctx) return;
      ctx      = new ACtx();
      gainNode = ctx.createGain();
      gainNode.gain.value = 0;
      gainNode.connect(ctx.destination);

      /* Fetch both files in parallel; start intro as soon as it's ready */
      fetch('splash_logo_audio.mp3')
        .then(function (r) { return r.arrayBuffer(); })
        .then(function (ab) { return ctx.decodeAudioData(ab); })
        .then(function (buf) {
          introBuf = buf;
          if (pendingPlay || ctx.state === 'running') {
            pendingPlay = false;
            startIntro();
          }
        })
        .catch(function () {});

      fetch('background_music.mp3')
        .then(function (r) { return r.arrayBuffer(); })
        .then(function (ab) { return ctx.decodeAudioData(ab); })
        .then(function (buf) { loopBuf = buf; })
        .catch(function () {});
    }

    btn.addEventListener('click', function () {
      hideTip();

      if (phase === 'idle') {
        /* First ever interaction — need to start the intro */
        if (!ctx) initCtx();
        if (ctx.state === 'suspended') {
          ctx.resume().then(function () {
            if (introBuf) startIntro(); else pendingPlay = true;
            btn.classList.remove('needs-tap');
          });
        } else {
          if (introBuf) startIntro(); else pendingPlay = true;
          btn.classList.remove('needs-tap');
        }
        return;
      }

      /* Intro playing or loop running — cycle volume */
      var next = (stateIdx + 1) % STATES.length;
      applyState(next);
    });

    /* Show hint on load; music dismisses it when it starts */
    applyState(0);
    showTip();
    tipDismissTimer = setTimeout(hideTip, 10000);

    /* Try autoplay on desktop (mobile stays muted until tap) */
    initCtx();
    if (ctx) {
      ctx.resume().then(function () { tryStart(); }).catch(function () {});
    }
  })();
  </script>
</body>
</html>
