<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; font-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'unsafe-inline'; base-uri 'self'; form-action 'self' mailto:; frame-ancestors 'none'; object-src 'none'; upgrade-insecure-requests" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>secretly.vip — coming soon</title>
  <!--
    Preload font files before any paint.
    crossorigin is required even for same-origin fonts because @font-face
    fetches use CORS mode — the preload must match or the browser downloads twice.
  -->
  <link rel="preload" href="fonts/cinzel-latin.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="fonts/outfit-latin.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23e52222'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='Georgia,serif' font-size='19' font-weight='700' fill='%23fff'%3ES%3C/text%3E%3C/svg%3E" />
  <style>
    /*
      font-display: block — text stays INVISIBLE while font downloads (up to ~3s).
      Combined with preload above, the font is ready in <200ms on most connections.
      No fallback font is ever shown, so no flash/swap at all.
    */
    @font-face {
      font-family: "Cinzel";
      src: url("fonts/cinzel-latin.woff2") format("woff2");
      font-weight: 400 600;
      font-style: normal;
      font-display: block;
    }
    @font-face {
      font-family: "Outfit";
      src: url("fonts/outfit-latin.woff2") format("woff2");
      font-weight: 300 500;
      font-style: normal;
      font-display: block;
    }

    :root {
      --bg: #f7f4f0;
      --ink: #100d0d;
      --dim: rgba(16, 13, 13, 0.45);
      --red: #e52222;
      --red-dim: rgba(229, 34, 34, 0.6);
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html { height: 100%; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: "Outfit", system-ui, -apple-system, sans-serif;
      font-weight: 400;
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding:
        calc(3.5rem + env(safe-area-inset-top, 0px))
        calc(1.5rem + env(safe-area-inset-right, 0px))
        calc(3.5rem + env(safe-area-inset-bottom, 0px))
        calc(1.5rem + env(safe-area-inset-left, 0px));
      -webkit-font-smoothing: antialiased;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 100;
      pointer-events: none;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='4' stitchTiles='stitch'/></filter><rect width='180' height='180' filter='url(%23n)'/></svg>");
    }

    .brand {
      position: fixed;
      top: calc(1.25rem + env(safe-area-inset-top, 0px));
      left: calc(1.25rem + env(safe-area-inset-left, 0px));
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--red);
      z-index: 10;
      line-height: 1;
    }

    .clock {
      position: fixed;
      bottom: calc(1.25rem + env(safe-area-inset-bottom, 0px));
      left: calc(1.25rem + env(safe-area-inset-left, 0px));
      right: calc(1.25rem + env(safe-area-inset-right, 0px));
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--dim);
      z-index: 10;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1;
    }

    main {
      width: 100%;
      max-width: 32rem;
    }

    h1 {
      font-family: "Cinzel", "Times New Roman", Times, serif;
      font-weight: 600;
      font-size: clamp(1.35rem, 5vw, 1.65rem);
      line-height: 1.3;
      letter-spacing: 0em;
      color: var(--ink);
      opacity: 0;
      word-break: break-word;
    }

    /* Cursor blink during decode */
    h1.decoding::after {
      content: '|';
      color: var(--red);
      animation: blink 0.6s step-end infinite;
      margin-left: 2px;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .slash {
      display: block;
      width: 100%;
      height: 1px;
      background: var(--red);
      margin: 1.25rem 0 1.5rem;
    }

    .contact {
      display: flex;
      align-items: flex-start;
      gap: 0.55rem;
      color: var(--dim);
      font-size: clamp(0.8rem, 3.2vw, 0.9rem);
      font-weight: 400;
      letter-spacing: 0.04em;
      flex-wrap: wrap;
    }

    .contact svg {
      width: 0.9rem;
      height: 0.9rem;
      stroke: var(--red-dim);
      fill: none;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
      margin-top: 0.15em;
    }

    .contact-text {
      flex: 1;
      min-width: 0;
      word-break: break-word;
    }

    .contact a {
      font-family: "Cinzel", "Times New Roman", Times, serif;
      font-size: clamp(0.82rem, 3vw, 0.92rem);
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px solid rgba(16, 13, 13, 0.15);
      padding-bottom: 1px;
      transition: color 0.18s ease, border-color 0.18s ease;
      word-break: break-all;
    }

    .contact a:hover  { color: var(--red); border-color: var(--red); }
    .contact a:focus-visible { outline: 1px solid var(--red); outline-offset: 3px; }

    @media (max-width: 360px) {
      h1 { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
  <span class="brand">secretly.vip</span>
  <span class="clock" id="clock" aria-live="polite" aria-label="Your local time"></span>

  <main>
    <h1 id="headline" aria-live="polite"></h1>
    <div class="slash" aria-hidden="true"></div>
    <p class="contact">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
        <path d="m22 6-10 7L2 6"/>
      </svg>
      <span class="contact-text">Reach out — <a href="mailto:support@secretly.vip">support@secretly.vip</a></span>
    </p>
  </main>

  <script>
  (function () {
    /* ── Matrix decode characters ── */
    var CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!?><#@|/\\$%^&*~';

    /* ── Quotes: hacking/launch themed, random each visit ── */
    var QUOTES = [
      'Establishing secure connection.',
      'Decrypting the launch sequence.',
      'Access denied. For now.',
      'Systems are being compiled.',
      'Signal acquired. Stand by.',
      'Bypassing the firewall.',
      'The protocol is being finalized.',
      'Loading classified content.',
      'Patience is a root privilege.',
      'Cracking the launch code.',
      'Initializing final sequence.',
      'Breach imminent. Please wait.',
    ];

    function rchar() {
      return CHARS[Math.floor(Math.random() * CHARS.length)];
    }

    /* ── Cycling quotes — new one every 5s, auto-decoded ── */
    var h1       = document.getElementById('headline');
    var qIndex   = Math.floor(Math.random() * QUOTES.length);
    var cycling  = false;

    function nextQuote() {
      if (cycling) return;         /* don't overlap with a running decode */
      cycling = true;

      /* Fade out */
      h1.style.transition = 'opacity 0.25s ease';
      h1.style.opacity    = '0';

      setTimeout(function () {
        qIndex = (qIndex + 1) % QUOTES.length;
        h1.style.transition = '';
        h1.style.opacity    = '1';
        decode(h1, QUOTES[qIndex], function () { cycling = false; });
      }, 280);
    }

    /* Patch decode() to accept an optional onDone callback */
    function decode(el, text, onDone) {
      var FRAME_MS = 30;
      var STEP_MS  = 32;
      var start    = Date.now();
      el.classList.add('decoding');

      var timer = setInterval(function () {
        var elapsed = Date.now() - start;
        var out = '';
        for (var i = 0; i < text.length; i++) {
          var ch = text[i];
          if (ch === ' ')               out += ' ';
          else if (elapsed > i * STEP_MS) out += ch;
          else                           out += rchar();
        }
        el.textContent = out;
        if (elapsed > (text.length - 1) * STEP_MS + 150) {
          clearInterval(timer);
          el.classList.remove('decoding');
          el.textContent = text;
          if (onDone) onDone();
        }
      }, FRAME_MS);
    }

    function start() {
      h1.style.opacity = '1';
      decode(h1, QUOTES[qIndex], function () {
        cycling = false;
        /* Cycle every 5 seconds after initial decode finishes */
        setInterval(nextQuote, 5000);
      });
    }

    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(start);
    } else {
      setTimeout(function () { h1.style.opacity = '1'; h1.textContent = QUOTES[qIndex]; cycling = false; setInterval(nextQuote, 5000); }, 200);
    }

    /* ── Local clock ── */
    var clockEl = document.getElementById('clock');
    var DAYS_S  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    var DAYS_L  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    var MONTHS  = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    function pad(n) { return String(n).padStart(2, '0'); }

    function tick() {
      var now    = new Date();
      var narrow = window.innerWidth < 480;
      var day    = narrow ? DAYS_S[now.getDay()] : DAYS_L[now.getDay()];
      var date   = pad(now.getDate());
      var month  = MONTHS[now.getMonth()];
      var year   = now.getFullYear();
      var h      = pad(now.getHours());
      var m      = pad(now.getMinutes());
      var s      = pad(now.getSeconds());
      clockEl.textContent = day + ' · ' + date + ' ' + month + ' ' + year + ' · ' + h + ':' + m + ':' + s;
    }

    tick();
    setInterval(tick, 1000);
  })();
  </script>
</body>
</html>
