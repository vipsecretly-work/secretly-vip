<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>secretly.vip — coming soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #faf9f7;
      --text: #141212;
      --muted: rgba(20, 18, 18, 0.5);
      /* Hot pink / pink-red */
      --accent: #e91e63;
      --accent-hover: #c2185b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
    }

    body {
      font-family: "Outfit", system-ui, sans-serif;
      font-weight: 400;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: clamp(2rem, 6vw, 4rem) clamp(1.5rem, 5vw, 2.5rem);
      -webkit-font-smoothing: antialiased;
    }

    main {
      width: 100%;
      max-width: 28rem;
      text-align: center;
    }

    .mark {
      font-family: "Cinzel", serif;
      font-size: clamp(0.95rem, 2.8vw, 1.2rem);
      font-weight: 600;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 2.25rem;
    }

    h1 {
      font-family: "Cinzel", serif;
      font-weight: 400;
      font-size: clamp(1.5rem, 4.2vw, 1.875rem);
      line-height: 1.35;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    .rule {
      width: 3rem;
      height: 1px;
      background: var(--accent);
      margin: 2rem auto;
      opacity: 0.9;
    }

    .contact {
      margin-top: 0;
    }

    .contact a {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 0.85rem;
      text-decoration: none;
      color: var(--muted);
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.02em;
      transition: color 0.2s ease;
    }

    .contact a:hover,
    .contact a:focus-visible {
      color: var(--text);
      outline: none;
    }

    .contact a:focus-visible .email {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .mail-icon {
      color: var(--accent);
      transition: color 0.2s ease, transform 0.2s ease;
    }

    .contact a:hover .mail-icon {
      color: var(--accent-hover);
      transform: translateY(-1px);
    }

    .mail-icon svg {
      width: 1.5rem;
      height: 1.5rem;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .email {
      font-family: "Cinzel", serif;
      font-size: clamp(1.1rem, 3vw, 1.35rem);
      font-weight: 500;
      letter-spacing: 0.05em;
      color: var(--accent);
    }

    .contact a:hover .email {
      color: var(--accent-hover);
    }

    .label {
      font-size: 0.9375rem;
      font-weight: 400;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <main>
    <p class="mark">secretly.vip</p>
    <h1>This site's gonna go live soon</h1>
    <div class="rule" aria-hidden="true"></div>

    <section class="contact" aria-label="Contact">
      <a href="mailto:support@secretly.vip">
        <span class="mail-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
            <path d="m22 6-10 7L2 6" />
          </svg>
        </span>
        <span class="label">Reach out</span>
        <span class="email">support@secretly.vip</span>
      </a>
    </section>
  </main>
</body>
</html>
