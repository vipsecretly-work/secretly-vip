<head>

  <style>
    /* Fonts ship with the site — no third-party font CDNs */
    @font-face {
      font-family: "Cinzel";
      src: url("fonts/cinzel-latin.woff2") format("woff2");
      font-weight: 400 600;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: "Outfit";
      src: url("fonts/outfit-latin.woff2") format("woff2");
      font-weight: 300 500;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #f5f2ed;
      --bg-deep: #ebe6df;
      --text: #141212;
      --muted: rgba(20, 18, 18, 0.52);
      --accent: #e91e63;
      --accent-soft: rgba(233, 30, 99, 0.12);
      --accent-hover: #c2185b;
      --card: rgba(255, 255, 255, 0.72);
      --shadow-1: 0 1px 2px rgba(20, 10, 30, 0.04);
      --shadow-2: 0 8px 24px rgba(233, 30, 99, 0.08), 0 2px 8px rgba(20, 10, 30, 0.06);
      --shadow-3: 0 24px 48px -12px rgba(233, 30, 99, 0.18), 0 12px 32px -8px rgba(20, 10, 40, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
    }

    body {
      font-family: "Outfit", system-ui, -apple-system, "Segoe UI", sans-serif;
      font-weight: 400;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(2rem, 6vw, 4rem) clamp(1.5rem, 5vw, 2.5rem);
      -webkit-font-smoothing: antialiased;
      position: relative;
      overflow-x: hidden;
      background:
        radial-gradient(ellipse 120% 80% at 50% -20%, rgba(233, 30, 99, 0.07), transparent 50%),
        radial-gradient(ellipse 80% 60% at 100% 100%, rgba(194, 24, 91, 0.06), transparent 45%),
        linear-gradient(165deg, var(--bg) 0%, var(--bg-deep) 100%);
    }

    /* Twinkling star layers (pure CSS, no images) */
    .starfield {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .starfield span {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #e53935;
      box-shadow:
        0 0 10px rgba(229, 57, 53, 0.95),
        0 0 18px rgba(198, 40, 40, 0.45);
      opacity: 0;
      animation: starFade 4.5s ease-in-out infinite;
    }

    .starfield span:nth-child(odd) {
      width: 8px;
      height: 8px;
      background: #d32f2f;
      box-shadow:
        0 0 12px rgba(211, 47, 47, 0.95),
        0 0 22px rgba(183, 28, 28, 0.5);
      animation-duration: 3.6s;
    }

    .starfield span:nth-child(3n) {
      animation-delay: -0.9s;
      animation-duration: 5.2s;
    }

    .starfield span:nth-child(5n) {
      animation-delay: -2.1s;
    }

    .starfield span:nth-child(7n) {
      animation-delay: -3.4s;
    }

    .starfield span:nth-child(11n) {
      animation-duration: 3.1s;
    }

    @keyframes starFade {
      0% {
        opacity: 0;
        transform: scale(0.6);
      }
      35% {
        opacity: 1;
        transform: scale(1);
      }
      70% {
        opacity: 0.25;
        transform: scale(0.85);
      }
      100% {
        opacity: 0;
        transform: scale(0.6);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .starfield span {
        animation: none;
        opacity: 0.55;
      }
      .glow-card {
        transition: none;
      }
      .glow-card:hover {
        transform: none;
      }
      .contact a:hover .mail-icon,
      .contact a:hover {
        transform: none;
      }
    }

    main {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 28rem;
      perspective: 1400px;
    }

    .glow-card {
      text-align: center;
      padding: clamp(2rem, 5vw, 2.75rem) clamp(1.5rem, 4vw, 2rem);
      background: var(--card);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.85);
      border-radius: 1.25rem;
      box-shadow:
        inset 0 0 0 1px rgba(233, 30, 99, 0.08),
        var(--shadow-1),
        var(--shadow-2);
      transform-style: preserve-3d;
      transition:
        transform 0.5s cubic-bezier(0.22, 1, 0.36, 1),
        box-shadow 0.5s cubic-bezier(0.22, 1, 0.36, 1);
      will-change: transform;
    }

    .glow-card:hover {
      transform: translateY(-8px) rotateX(4deg) rotateY(-3deg) translateZ(12px);
      box-shadow: var(--shadow-1), var(--shadow-3);
    }

    .mark {
      font-family: "Cinzel", "Times New Roman", Times, serif;
      font-size: clamp(0.95rem, 2.8vw, 1.2rem);
      font-weight: 600;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 2rem;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    h1 {
      font-family: "Cinzel", "Times New Roman", Times, serif;
      font-weight: 400;
      font-size: clamp(1.5rem, 4.2vw, 1.875rem);
      line-height: 1.35;
      letter-spacing: 0.02em;
      color: var(--text);
      text-shadow: 0 1px 1px rgba(255, 255, 255, 0.8);
    }

    .rule {
      width: 3.5rem;
      height: 2px;
      margin: 2rem auto;
      border-radius: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.85;
      box-shadow: 0 0 12px var(--accent-soft);
    }

    .contact {
      margin-top: 0;
    }

    .contact a {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 0.85rem;
      text-decoration: none;
      color: var(--muted);
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.02em;
      transition: color 0.25s ease, transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .contact a:hover,
    .contact a:focus-visible {
      color: var(--text);
      outline: none;
      transform: translateY(-3px) translateZ(8px);
    }

    .contact a:focus-visible .email {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .mail-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 3rem;
      height: 3rem;
      border-radius: 50%;
      color: var(--accent);
      background: linear-gradient(145deg, #fff 0%, var(--accent-soft) 100%);
      box-shadow:
        0 4px 12px rgba(233, 30, 99, 0.15),
        inset 0 1px 0 rgba(255, 255, 255, 0.95);
      transition: color 0.25s ease, transform 0.35s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.35s ease;
    }

    .contact a:hover .mail-icon {
      color: var(--accent-hover);
      transform: translateY(-4px) scale(1.05) rotateX(8deg);
      box-shadow:
        0 12px 28px rgba(233, 30, 99, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 1);
    }

    .mail-icon svg {
      width: 1.5rem;
      height: 1.5rem;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.06));
    }

    .email {
      font-family: "Cinzel", "Times New Roman", Times, serif;
      font-size: clamp(1.1rem, 3vw, 1.35rem);
      font-weight: 500;
      letter-spacing: 0.05em;
      color: var(--accent);
    }

    .contact a:hover .email {
      color: var(--accent-hover);
    }

    .label {
      font-size: 0.9375rem;
      font-weight: 400;
      letter-spacing: 0.05em;
    }
  </style>
</head>
